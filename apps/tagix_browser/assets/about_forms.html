<title>Tagix Forms</title>

<body>
<h1>Tagix Forms</h1>
<p>This page exists to test browser-side HTML controls that are currently mapped onto the shared UI pipeline.</p>
<p><a href="about:tagix">Back to the built-in home page</a></p>
<h2>Text controls</h2>
<p><input type="text" value="https://kolibrios.org" placeholder="Type a URL"></p>
<p><input type="search" placeholder="Search demo"></p>
<textarea rows="4">Textarea fallback content.
Second line.
Third line.</textarea>
<h2>Choice controls</h2>
<p><input type="checkbox" checked value="Remember this choice"></p>
<p><input type="checkbox" value="Enable compact mode"></p>
<p><input type="radio" name="theme" checked value="Ocean theme"></p>
<p><input type="radio" name="theme" value="Sunset theme"></p>
<p><select>
<option selected>First option</option>
<option>Second option</option>
<option>Third option</option>
</select></p>
<h2>Range and progress</h2>
<p><input type="range" min="0" max="10" step="2" value="4"></p>
<p><progress value="42" max="100"></progress></p>
<h2>Buttons</h2>
<p><button>Plain button</button></p>
<p><input type="submit" value="Submit button"></p>
</body>
</html>
