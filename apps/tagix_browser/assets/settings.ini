; Tagix Browser runtime settings.
; Paths are resolved relative to the app working directory.

[navigation]
home_url = tagix://welcome

[assets]
shell_template = assets/shell.html
welcome_page = assets/pages/welcome.html
forms_page = assets/pages/forms.html
ca_bundle = assets/ca-bundle.pem
font_dir = assets/fonts

[cache]
; If dir is set, it is used as-is.
; If dir is empty, the browser tries roots + name.
dir =
roots = /tmp0/1,/tmp1/1
name = tagix_browser.cache
cookie_store = cookies.tsv

[network]
; Leave blank to use the built-in runtime defaults.
user_agent =
accept_language =
max_content_bytes = 524288
max_font_content_bytes = 4194304
