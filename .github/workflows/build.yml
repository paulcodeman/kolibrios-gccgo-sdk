name: build

on:
  push:

jobs:
  build-all:
    runs-on: ubuntu-24.04
    env:
      GO: gccgo
      KEEP_PKG: "1"
      KEEP_ABI: "1"
      FAST_PKG: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            gccgo \
            gcc-multilib \
            gccgo-multilib \
            make \
            nasm \
            binutils \
            mtools \
            qemu-system-x86

      - name: Build all examples and apps
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t targets < <(find examples apps -type f -name Makefile -printf '%h\n' | sort -u)
          echo "Found ${#targets[@]} targets"
          for dir in "${targets[@]}"; do
            echo "==> Building ${dir}"
            ./build-app.sh "${dir}"
          done

      - name: Package kex artifacts
        shell: bash
        run: |
          set -euo pipefail
          find examples apps -type f -name '*.kex' -print > kex-files.txt
          if [[ ! -s kex-files.txt ]]; then
            echo "No .kex files found" >&2
            exit 1
          fi
          tar -czf kex-artifacts.tar.gz -T kex-files.txt

      - name: Upload kex artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kex-artifacts
          path: |
            kex-artifacts.tar.gz
            kex-files.txt
