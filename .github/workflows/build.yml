name: build

on:
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-all:
    runs-on: ubuntu-24.04
    env:
      GO: gccgo
      KEEP_PKG: "1"
      KEEP_ABI: "1"
      FAST_PKG: "1"
      KPACK: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            gccgo \
            gcc-multilib \
            gccgo-multilib \
            make \
            binutils \
            mtools \
            qemu-system-x86

      - name: Prepare bundled tools
        run: |
          chmod +x tooling/bin/i386-elf-objcopy
          chmod +x tooling/bin/nasm
          chmod +x tooling/bin/objcopy
          chmod +x tooling/bin/strip
          chmod +x tooling/bin/ld

      - name: Build all apps and examples
        shell: bash
        run: |
          set -euo pipefail
          ./make-all.sh

      - name: Build all libs
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t targets < <(find libs -type f -name Makefile -printf '%h\n' | sort -u)
          echo "Found ${#targets[@]} libs"
          for dir in "${targets[@]}"; do
            echo "==> Building ${dir}"
            ./build-lib.sh "${dir}"
          done

      - name: Upload kex artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kex-artifacts
          path: |
            apps/**/*.kex

      - name: Upload obj artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obj-artifacts
          path: |
            libs/**/*.obj
